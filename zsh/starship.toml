"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 100
command_timeout = 1000
 
# p10k lean style — left prompt: context/dir/git, right: langs/duration
format = """$os$username$directory$git_branch$git_status$golang$python$nodejs$rust$docker_context$kubernetes$character"""
# Work around starship/starship#560
add_newline = false

right_format = """$status$cmd_duration"""

# ── Prompt character ──────────────────────────────────────────────────────────
[character]
success_symbol = '[❯](bold green)'
error_symbol = '[❯](bold red)'
vimcmd_symbol = '[❮](bold green)'
vimcmd_replace_one_symbol = '[❮](bold purple)'
vimcmd_replace_symbol = '[❮](bold purple)'
vimcmd_visual_symbol = '[❮](bold yellow)'

# ── OS icon ───────────────────────────────────────────────────────────────────
[os]
disabled = false
format = '[$symbol](bold green) '

[os.symbols]
Manjaro = ""
Linux = " "

# ── User ──────────────────────────────────────────────────────────────────────
[username]
show_always = true
style_user = "bold cyan"
style_root = "bold red"
format = '[$user]($style) '

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
style = "bold blue"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "red"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"Music" = "󰝚"
"Pictures" = " "

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold purple"
format = 'on [$symbol$branch]($style) '

[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style) )'
ahead = "⇡ $count"
behind = "⇣ $count"
diverged = "⇕⇡ $ahead_count⇣$behind_count"
modified = "! $count"
untracked = "? $count"
staged = '[++\($count\)](green)'
deleted = "✘ $count"

[git_commit]
commit_hash_length = 4
tag_symbol = ' '

[line_break]
disabled = true

# ── Languages ─────────────────────────────────────────────────────────────────
[golang]
symbol = " "
style = "bold cyan"
format = '[$symbol($version )]($style)'

[python]
symbol = " "
style = "bold yellow"
format = '[$symbol($version )(\(#$virtualenv\) )]($style)'

[nodejs]
symbol = "󰎙 "
style = "bold green"
format = '[$symbol($version )]($style)'

[rust]
symbol = "󱘗 "
style = "bold red"
format = '[$symbol($version )]($style)'

# ── DevOps ────────────────────────────────────────────────────────────────────
[docker_context]
symbol = " "
style = "bold blue"
format = '[$symbol$context]($style)'
only_with_files = true

[kubernetes]
symbol = "󱃾 "
style = "bold blue"
format = '[$symbol$context(\($namespace\))]($style)'
disabled = true 

# ── Command duration ──────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2_000
show_milliseconds = false
format = 'took [$duration](bold yellow) '
show_notifications = true
min_time_to_notify = 45_000

# ── Status (right prompt — only on error) ─────────────────────────────────────
[status]
symbol = "󰅙 "
success_symbol = "󰄬 "
not_executable_symbol = "󰆍 "
not_found_symbol = "󰍉 "
sigint_symbol = "󰚌 "
signal_symbol = "󱐋 "
recognize_signal_code = true
pipestatus = true

map_symbol = true 
disabled = false

style = "bold red"
format = '[$symbol$common_meaning$signal_name$maybe_int]($style) '
success_style = "bold green"

pipestatus_format = '$pipestatus   [$symbol$status]($style) '
pipestatus_separator = " | "

[localip]
ssh_only = false
format = '@[$localipv4](bold red) '
disabled = false

# ── Disabled ──────────────────────────────────────────────────────────────────
[aws]
symbol = " "
disabled = false

[gcloud]
symbol = "󱇶 "
disabled = true

[package]
symbol = "󰏗 "
disabled = false

[time]
disabled = true

