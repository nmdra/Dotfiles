# ─── OSC / OSD ──────────────────────────────────────────────
osc=no
osd-bar=no
osd-font=Manrope Medium
osd-font-size=30
osd-color="#C0FFFFFF"

# ─── Window ─────────────────────────────────────────────────
border=no
keep-open=yes
snap-window=yes
autofit=85%x85%
cursor-autohide=1000
pause=yes
save-position-on-quit=yes
# watch-later-options-remove=sub-pos,audio-delay,pause
reset-on-next-file=pause

# ─── Renderer ───────────────────────────────────────────────
profile=gpu-hq
vo=gpu-next
gpu-api=auto
hwdec=auto-copy-safe
# vd-lavc-dr=yes

# ─── Scaling ────────────────────────────────────────────────
scale=ewa_lanczos
cscale=ewa_lanczos
dscale=catmull_rom
scale-antiring=0.6
cscale-antiring=0.6
correct-downscaling=yes
linear-downscaling=yes
sigmoid-upscaling=yes
dither-depth=auto

# ─── HDR / Tone Mapping (gpu-next only) ─────────────────────
target-colorspace-hint=yes
tone-mapping=bt.2446a
hdr-compute-peak=yes

# ─── Deband ─────────────────────────────────────────────────
# Always-on medium-heavy baseline. Resolution profiles tune further.
# Medium-heavy catches banding in HEVC/AVC/WEB without destroying detail.
deband=yes
deband-iterations=2
deband-threshold=48
deband-range=24
deband-grain=4

# ─── Audio ──────────────────────────────────────────────────
alang=eng,en
volume=90
volume-max=120
mute=no
audio-file-auto=fuzzy
audio-channels=auto
audio-pitch-correction=yes
# dynaudnorm: smooths volume spikes. m=5.0 caps max gain to prevent clipping.
af=lavfi=[dynaudnorm=f=75:g=25:p=0.55:m=5.0]

# ─── Subtitles ──────────────────────────────────────────────
slang=eng,en
sub-auto=fuzzy
sub-font=Manrope
sub-bold=no
sub-font-size=45
sub-blur=0.2
sub-color="#FFFFFFFF"
sub-border-size=2.5
sub-border-color="#CC000000"
sub-shadow-offset=1
sub-shadow-color="#33000000"
sub-pos=95
sub-margin-y=15
stretch-image-subs-to-screen=yes
demuxer-mkv-subtitle-preroll-secs=2

# ─── Screenshots ────────────────────────────────────────────
screenshot-template="%X{~~desktop/}%F [%wH.%wM.%wS.%wT]"
screenshot-format=png
screenshot-tag-colorspace=yes
screenshot-high-bit-depth=yes
screenshot-png-compression=4

# ─── Terminal ───────────────────────────────────────────────
msg-color=yes
msg-module=yes

# ─── Cache ──────────────────────────────────────────────────
cache=yes
demuxer-max-bytes=150MiB
demuxer-max-back-bytes=75MiB

# ─── Seeking ────────────────────────────────────────────────
hr-seek=yes
hr-seek-framedrop=no

# ============================================================
#  AUTO PROFILES — Resolution & Codec Specific
#  profile-cond uses nil guards to prevent errors between files.
#  profile-restore=copy reverts settings when the file changes.
# ============================================================

# ── 4K / 2160p ──────────────────────────────────────────────
# High bitrate — light deband, catmull_rom downscaler for 4K→1080p.
# No upscaling so sigmoid is wasteful.
[2160p]
profile-cond=p["video-params/h"] ~= nil and p["video-params/h"] >= 2160
profile-restore=copy
dscale=catmull_rom
sigmoid-upscaling=no
linear-downscaling=yes
deband-iterations=1
deband-threshold=32
deband-range=16
deband-grain=8

# ── 1080p ───────────────────────────────────────────────────
# Native 1080p — no upscaling. Moderate deband, catmull_rom downscaler.
[1080p]
profile-cond=p["video-params/h"] ~= nil and p["video-params/h"] == 1080
profile-restore=copy
dscale=catmull_rom
sigmoid-upscaling=no
linear-downscaling=yes
deband-iterations=2
deband-threshold=40
deband-range=20
deband-grain=4

# ── 1080p HEVC ──────────────────────────────────────────────
# HEVC compression produces more banding in dark/flat scenes — boost deband.
# Applies on top of [1080p] since both conditions match; HEVC values win.
[1080p-hevc]
profile-cond=p["video-params/h"] ~= nil and p["video-params/h"] == 1080 and p["video-params/codec"] == "hevc"
profile-restore=copy
deband-iterations=3
deband-threshold=56
deband-range=24
deband-grain=6

# ── 720p ────────────────────────────────────────────────────
# Being upscaled to 1080p — full upscaling pipeline, heavier deband.
[720p]
profile-cond=p["video-params/h"] ~= nil and p["video-params/h"] == 720
profile-restore=copy
scale=ewa_lanczos
sigmoid-upscaling=yes
linear-downscaling=no
deband-iterations=3
deband-threshold=52
deband-range=22
deband-grain=4

# ── 720p HEVC ───────────────────────────────────────────────
# Doubly compressed — heaviest deband among HD tiers.
[720p-hevc]
profile-cond=p["video-params/h"] ~= nil and p["video-params/h"] == 720 and p["video-params/codec"] == "hevc"
profile-restore=copy
scale=ewa_lanczos
sigmoid-upscaling=yes
linear-downscaling=no
deband-iterations=3
deband-threshold=64
deband-range=26
deband-grain=8

# ── 480p / SD ───────────────────────────────────────────────
# DVD / SD — maximum deband, full upscaling pipeline.
[480p]
profile-cond=p["video-params/h"] ~= nil and p["video-params/h"] <= 480
profile-restore=copy
scale=ewa_lanczos
sigmoid-upscaling=yes
linear-downscaling=no
deband-iterations=4
deband-threshold=64
deband-range=26
deband-grain=32

# ── 1080p AV1 ───────────────────────────────────────────────
# Slightly stronger deband than plain 1080p, lighter than HEVC.
[1080p-av1]
profile-cond=p["video-params/h"] ~= nil and p["video-params/h"] == 1080 and p["video-params/codec"] == "av1"
profile-restore=copy
dscale=catmull_rom
sigmoid-upscaling=no
linear-downscaling=yes
deband=yes
deband-iterations=2
deband-threshold=48
deband-range=22
deband-grain=6

# ── 720p AV1 ────────────────────────────────────────────────
# AV1 720p — common on YouTube adaptive streams.
# Full upscaling pipeline. AV1 at 720p is cleaner than HEVC 720p
# so deband is lighter than 720p-hevc but heavier than plain 720p.
[720p-av1]
profile-cond=p["video-params/h"] ~= nil and p["video-params/h"] == 720 and p["video-params/codec"] == "av1"
profile-restore=copy
scale=ewa_lanczos
sigmoid-upscaling=yes
linear-downscaling=no
deband=yes
deband-iterations=2
deband-threshold=52
deband-range=22
deband-grain=6

# ============================================================
#  NETWORK / STREAMING PROFILES
# ============================================================

[protocol.http]
hls-bitrate=max
cache=yes
no-cache-pause

[protocol.https]
profile=protocol.http

[protocol.ytdl]
profile=protocol.http

# ============================================================
#  yt-dlp FORMAT PROFILES (apply manually)
#  Usage: mpv --profile=1080p-ytdl <url>
# ============================================================

[1080p-ytdl]
ytdl-format=bestvideo[height<=?1080]+bestaudio/best

[1080p60-ytdl]
ytdl-format=bestvideo[height<=?1080][fps<=?60]+bestaudio/best

[720p-ytdl]
ytdl-format=bestvideo[height<=?720]+bestaudio/best

[480p-ytdl]
ytdl-format=bestvideo[height<=?480]+bestaudio/best

[360p-ytdl]
ytdl-format=bestvideo[height<=?360]+bestaudio/best
