# ==============================================================================
# mpv Keybindings Overhaul
# ==============================================================================

# ------------------------------------------------------------------------------
# Playback Controls
# ------------------------------------------------------------------------------
SPACE       cycle pause                   # Toggle pause
f           cycle fullscreen              # Toggle fullscreen
m           cycle mute                    # Toggle mute
UP          add volume  2                 # Increase volume
DOWN        add volume -2                 # Decrease volume
WHEEL_UP    add volume  2                 # Mouse wheel: Increase volume
WHEEL_DOWN  add volume -2                 # Mouse wheel: Decrease volume
[           add speed -0.25               # Decrease playback speed
]           add speed  0.25               # Increase playback speed
Ctrl+[      add speed -0.05               # Fine speed decrease
Ctrl+]      add speed  0.05               # Fine speed increase
{           set speed 1.0                 # Reset speed
}           set speed 1.0                 # Reset speed

# ------------------------------------------------------------------------------
# Seeking (User Preferences)
# ------------------------------------------------------------------------------
# Default seek (5s)
RIGHT       seek  5
LEFT        seek -5

# Alternative seek (10s)
Ctrl+RIGHT  seek  10
Ctrl+LEFT   seek -10

# Large seek (30s)
Shift+UP    seek  30
Shift+DOWN  seek -30

# Fine/Sub seek
Ctrl+UP     no-osd sub-seek  1
Ctrl+DOWN   no-osd sub-seek -1

# ------------------------------------------------------------------------------
# Subtitles and Audio Tracks
# ------------------------------------------------------------------------------
s           cycle sub                     # Cycle subtitles
S           cycle sub-visibility          # Toggle subtitle visibility
a           cycle audio                   # Cycle audio tracks
Ctrl+WHEEL_UP add sub-scale  0.1          # Scale subtitles up
g           add sub-scale -0.1            # Scale subtitles down (matches user's 'g')

# ------------------------------------------------------------------------------
# ModernZ (OSC Replacement)
# ------------------------------------------------------------------------------
v           script-binding modernz/visibility      # Cycle visibility modes
w           script-binding modernz/progress-toggle # Toggle persistent progress bar
x           script-message-to modernz osc-show     # Show OSC
DEL         script-binding modernz/visibility      # (Compatibility with old binding)

# ------------------------------------------------------------------------------
# Scripts: Navigation and Quality
# ------------------------------------------------------------------------------
# Playlist Manager
SHIFT+ENTER script-binding playlistmanager/showplaylist
ENTER       script-binding playlistmanager/showplaylist # (Optional: logical entry)

# Quality Menu (Stream quality selection)
F           script-binding quality_menu/video_formats
Alt+f       script-binding quality_menu/audio_formats
ctrl+f      script-binding quality_menu/video_formats   # (Replaces old selectformat)

# Seek To (Absolute timestamp)
t           script-message-to seek_to toggle-seeker

# Reload (Fix buffering/stuck streams)
F5          script-binding reload/reload
Ctrl+r      script-binding reload/reload

# Skip Silence
F11         script-binding skipsilence/toggle

# ------------------------------------------------------------------------------
# Video and Audio Processing
# ------------------------------------------------------------------------------
# Debanding
b           cycle-values deband "yes" "no"
B           cycle-values deband-iterations "1" "2" "3"; cycle-values deband-threshold "35" "60" "100"; cycle-values deband-range "16" "20" "25"; cycle-values deband-grain "5" "24" "48"; show-text "Deband: ${deband-iterations}:${deband-threshold}:${deband-range}:${deband-grain}"

# Audio Filters
F2          cycle-values af "lavfi=[loudnorm=I=-16:TP=-3:LRA=4]" "lavfi=[dynaudnorm=f=75:g=25:p=0.55]" ""
d           vf del -1                     # Remove last video filter

# Misc
Ctrl+t      cycle ontop                   # Keep window on top
Ctrl+r      cycle-values video-rotate "90" "180" "270" "0"
q           quit-watch-later              # Quit and save position
Shift+q     set save-position-on-quit no; quit; delete-watch-later-config # Quit without saving
